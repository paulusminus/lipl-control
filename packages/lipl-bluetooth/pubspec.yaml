name: lipl_bluetooth
description: Scan for TV devices and write a part to them
repository: https://github.com/paulusminus/lipl-control/
publish_to: "none"

version: 1.13.21

environment:
  sdk: ^3.11.5
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_blue_plus: ^2.3.2
  logging: ^1.3.0
  flutter_localizations:
    sdk: flutter
  intl: any
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.0

flutter:
  generate: true
  uses-material-design: true
